<style>
    :root {
        --blue: #0A84FF;
        --text: #111111;
        --sub: #6E6E73;
        --bg: #FAFAFC;
        --card: rgba(255,255,255,0.82);
        --line: rgba(255,255,255,0.65);
        --shadow: 0 18px 50px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
        background:
            radial-gradient(circle at top left, rgba(10,132,255,0.10), transparent 32%),
            linear-gradient(180deg, #F7F8FC 0%, #EEF2F8 100%);
        color: var(--text);
    }

    .phone-shell {
        width: 100%;
        max-width: 430px;
        background: rgba(255,255,255,0.58);
        backdrop-filter: blur(22px);
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 34px;
        box-shadow: var(--shadow);
        padding: 18px;
    }

    .view-container {
        background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.78));
        border: 1px solid var(--line);
        border-radius: 28px;
        min-height: 760px;
        padding: 28px 22px 24px;
        position: relative;
        overflow: hidden;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 26px;
    }

    .brand {
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: -0.02em;
    }

    .brand span {
        color: var(--blue);
    }

    .step-chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(10,132,255,0.08);
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 700;
    }

    .screen {
        display: none;
        animation: fadeUp 0.32s ease;
    }

    .screen.active { display: block; }

    .hero {
        margin-top: 18px;
        margin-bottom: 26px;
    }

    h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        line-height: 1.18;
        letter-spacing: -0.04em;
        font-weight: 800;
    }

    .subtext {
        margin: 0;
        color: var(--sub);
        font-size: 0.98rem;
        line-height: 1.55;
        letter-spacing: -0.02em;
    }

    .card-list {
        display: grid;
        gap: 14px;
        margin-top: 24px;
    }

    .choice-card,
    .primary-button,
    .secondary-button {
        width: 100%;
        border: 0;
        border-radius: 24px;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .choice-card {
        text-align: left;
        padding: 22px 20px;
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.9);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }

    .choice-card:hover,
    .choice-card:active {
        transform: translateY(-1px);
        border-color: rgba(10,132,255,0.28);
        box-shadow: 0 14px 28px rgba(10,132,255,0.10);
    }

    .choice-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
    }

    .choice-card h3 {
        margin: 0;
        font-size: 1.16rem;
        letter-spacing: -0.03em;
    }

    .choice-card p {
        margin: 8px 0 0;
        font-size: 0.92rem;
        color: var(--sub);
        line-height: 1.45;
    }

    .icon-badge {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(10,132,255,0.10);
        color: var(--blue);
        font-size: 1.15rem;
        flex: 0 0 auto;
    }

    .field-wrap {
        margin-top: 22px;
    }

    .input-label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: -0.02em;
    }

    .input-box {
        width: 100%;
        padding: 18px 18px;
        border-radius: 18px;
        border: 1px solid rgba(17,17,17,0.08);
        background: rgba(255,255,255,0.92);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-box:focus {
        border-color: rgba(10,132,255,0.45);
        box-shadow: 0 0 0 4px rgba(10,132,255,0.10);
    }

    .primary-button {
        margin-top: 16px;
        padding: 20px;
        background: linear-gradient(135deg, #0A84FF, #3AA0FF);
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        box-shadow: 0 12px 24px rgba(10,132,255,0.22);
    }

    .primary-button:hover,
    .primary-button:active {
        transform: translateY(-1px);
    }

    .secondary-button {
        margin-top: 12px;
        padding: 16px;
        background: transparent;
        color: var(--blue);
        font-size: 0.96rem;
        font-weight: 700;
    }

    .footer-note {
        margin-top: 22px;
        text-align: center;
        color: #8E8E93;
        font-size: 0.82rem;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(14px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="phone-shell">
    <div class="view-container">
        <div class="topbar">
            <div class="brand">ipsi<span>PASS</span></div>
            <div class="step-chip" id="stepLabel">STEP 1</div>
        </div>

        <div class="screen active" id="scr1">
            <div class="hero">
                <h1>어떤 입시를<br>준비하시나요?</h1>
                <p class="subtext">딱 맞는 예측 흐름으로 바로 안내해드릴게요.</p>
            </div>

            <div class="card-list">
                <button class="choice-card" onclick="goNext(2)">
                    <div class="choice-top">
                        <div>
                            <h3>고입 패스</h3>
                            <p>중학생 전용 · 특목고 · 자사고 · 일반고</p>
                        </div>
                        <div class="icon-badge">🎓</div>
                    </div>
                </button>

                <button class="choice-card" onclick="goNext(3)">
                    <div class="choice-top">
                        <div>
                            <h3>대입 패스</h3>
                            <p>고등학생 전용 · 수시 · 정시 합격예측</p>
                        </div>
                        <div class="icon-badge">📘</div>
                    </div>
                </button>
            </div>

            <p class="footer-note">복잡한 입력 없이, 필요한 것만 순서대로 물어봅니다.</p>
        </div>

        <div class="screen" id="scr2">
            <div class="hero">
                <h1>현재 학년을<br>선택해주세요</h1>
                <p class="subtext">학교 유형과 지원 가능 전형을 맞춤으로 보여드릴게요.</p>
            </div>

            <div class="card-list">
                <button class="choice-card" onclick="alert('다음 단계로 연결 예정입니다.')">
                    <div class="choice-top">
                        <div>
                            <h3>중학교 3학년</h3>
                            <p>올해 지원 가능한 고입 전형 중심</p>
                        </div>
                        <div class="icon-badge">3</div>
                    </div>
                </button>

                <button class="choice-card">
                    <div class="choice-top">
                        <div>
                            <h3>중학교 1 · 2학년</h3>
                            <p>미리 준비하는 성적 추이와 목표 관리</p>
                        </div>
                        <div class="icon-badge">12</div>
                    </div>
                </button>
            </div>

            <button class="secondary-button" onclick="goNext(1)">← 뒤로 가기</button>
        </div>

        <div class="screen" id="scr3">
            <div class="hero">
                <h1>목표 대학이<br>있으신가요?</h1>
                <p class="subtext">희망 대학을 입력하면 그 기준으로 예측을 시작합니다.</p>
            </div>

            <div class="field-wrap">
                <label class="input-label" for="collegeInput">희망 대학</label>
                <input id="collegeInput" class="input-box" type="text" placeholder="예: 경북대학교, 영남대학교">
                <button class="primary-button">다음 단계로</button>
            </div>

            <button class="secondary-button" onclick="goNext(1)">← 뒤로 가기</button>
        </div>
    </div>
</div>

<script>
    function goNext(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr' + n).classList.add('active');

        const stepLabel = document.getElementById('stepLabel');
        const stepMap = { 1: 'STEP 1', 2: 'STEP 2', 3: 'STEP 2' };
        stepLabel.textContent = stepMap[n] || 'STEP 1';
    }
</script>
